{% extends 'core/base.html' %}
{% block title %}Sign In Error — FarmProject{% endblock %}

{% block content %}
<section class="min-h-[60vh] flex items-center justify-center px-6 py-16">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center" data-aos="zoom-in">
        <p class="text-5xl mb-4">⚠️</p>
        <h1 class="font-display text-2xl font-bold text-earth-800 mb-3">Sign-In Didn't Work</h1>
        <p class="text-earth-500 mb-6">Something went wrong connecting to Google. Please try again.</p>
        <a href="{% url 'account_login' %}" class="inline-block px-8 py-3 bg-clay-500 text-white rounded-full font-semibold hover:bg-clay-600 transition-all">
            Try Again
        </a>
    </div>
</section>
{% endblock %}
